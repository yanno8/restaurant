<!DOCTYPE html>
<html>
<head>
  <title>Ordering - Restaurant</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js">
    </script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="./css/ordering.css"> 
  </head>
  <body>
    <div class="col-md-4 col-md-offset-4">
      <div>
        <p>Ordering Foods
        </p>
      </div>
      <div class="form-group">
        <form id="form1" method="post">

          <label>Title</label> 
          <input type="text" name="title" placeholder="" required="" class="form-control"><br/>
          <label>First Name</label> 
          <input type="text" name="firstName" placeholder="" required="" class="form-control"><br/>
          <label>Last Name</label> 
          <input type="text" name="lastName" placeholder="" required="" class="form-control"><br/>
          <label>Email</label> 
          <input type="email" name="email" placeholder="" required="" class="form-control"><br/>
          <label>Confirm Email</label> 
          <input type="email" name="confEmail" placeholder="" required="" class="form-control"><br/>
          <label>telephone</label> 
          <input type="text" name="telephone" placeholder="" required="" class="form-control"><br/>
          <label>City</label> 
          <input type="text" name="city" placeholder="" required="" class="form-control"><br/>
          <label>Place</label> 
          <input type="text" name="place" placeholder="" required="" class="form-control"><br/>
          <label>Foods</label> 
          <input type="text" name="foods" placeholder="" required="" class="form-control"><br/>
          <label>Date</label> 
          <input type="date" name="date" placeholder="" required="" class="form-control"><br/>
          <label>Time</label> 
          <input type="time" name="time" placeholder="" required="" class="form-control"><br/>
          <input type="submit" value="Register" class="btn btn-success">
        </form>
      </div>
      
  <span class="image-ronde-bg"></span>
      <div class="mssg bg-danger">
        <span id="check"></span>
      </div>
      <div id="LangTable"><a href="/login" id="aaa"></a>
      </div>
    </div>
  <script src="./js/ordering.js"></script>
</body>
</html>

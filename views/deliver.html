<!DOCTYPE html>
<html>
<head>
	<title>Deliver Registration</title>
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js">
	</script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
	<link rel="stylesheet" href="./css/register.css">
    <script src="./js/register.js"></script>
</head>
<body>

	<div class="col-md-4 col-md-offset-4">
		<div>
			<p>Register New Deliver</p>
		</div>
		<div class="form-group">
			<form id="form1" method="post">
				<input type="text" name="firstName" placeholder="First Name" required="" class="form-control"><br/>
				<input type="text" name="lastName" placeholder="Last Name" required="" class="form-control"><br/>
				<input type="text" name="username" placeholder="Username" required="" class="form-control"><br/>
				<input type="email" name="email" placeholder="E-mail" required="" class="form-control"><br/>
				<input type="text" name="phone" placeholder="Phone Number" required="" class="form-control"><br/>
				<input type="text" name="address" placeholder="Address" required="" class="form-control"><br/>
				<input type="date" name="birthday" placeholder="Birthday" required="" class="form-control"><br/>
				<input type="text" name="birthdayPlace" placeholder="Place of Birth" required="" class="form-control"><br/>
				<input type="password" name="password" placeholder="Password" required="" class="form-control"><br/>
				<input type="password" name="passwordConf" placeholder="Confirm Password" required="" class="form-control"><br/>
				<input type="submit" value="Register" class="btn btn-success">
			</form>
		</div>
		
		<div class="mssg bg-danger">
			<span id="check"></span>
		</div>
		<div id="LangTable"><a href="/dashboard" id="aaa"></a>
		</div>
	</div>
</body>
</html>
